notes: "Seit dem 27.3.2025 offiziell „Titans Blue“ als alleinige Heimtrikot-Grundfarbe (dunkles Marineblau; löst die Rotation mit dem vorherigen Navy-Trikot ab). Quelle: NBC Sports/ProFootballTalk „Titans switch to 'Titans blue' as primary home jersey color“, 27.3.2025. Nike ist seit 2012 exklusiver On-Field-Ausrüster aller NFL-Teams (ligaweiter Deal, Quelle: NFL.com/ESPN)."
